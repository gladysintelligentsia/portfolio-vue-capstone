<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Home Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="#">ShopName</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="p-5 bg-dark text-white text-center">
        <h1>Welcome to Our Store</h1>
        <p>Best deals on the latest tech!</p>
    </section>

    <!-- Cards Section -->
    <div class="container my-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Product 1</h5>
                        <p class="card-text">Description of the item.</p>
                    </div>
                </div>
            </div>
            <!-- Add more cards here -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center p-4 bg-light">
        <p>&copy; 2026 E-commerce Exam</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
